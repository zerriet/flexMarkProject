# POC profile: H2 in PostgreSQL compatibility mode with H2 web console.
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=poc

spring.datasource.url=jdbc:h2:mem:flexmarkdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Run schema.sql and data.sql on startup
spring.sql.init.mode=always

# H2 web console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
